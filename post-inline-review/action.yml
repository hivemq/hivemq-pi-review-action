name: 'Pi PR Review - Post Inline Review'
description: 'Posts the judge''s structured review as inline PR review comments'
inputs:
  review-json:
    description: 'Path to the JSON review written by the judge''s submit_review tool'
    required: true
  pr-number:
    description: 'Pull request number'
    required: true
  github-token:
    description: 'GitHub token with pull-requests:write permission'
    required: true
runs:
  using: composite
  steps:
    - id: post
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
      env:
        REVIEW_JSON: ${{ inputs.review-json }}
        PR_NUMBER: ${{ inputs.pr-number }}
        ACTION_PATH: ${{ github.action_path }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs');
          const pull_number = Number(process.env.PR_NUMBER);
          const owner = context.repo.owner;
          const repo = context.repo.repo;

          // The judge's output arrives as JSON validated against review-contract/schema.js
          // before pi ever invoked the tool. No parsing, no regex, nothing to drift.
          const review = JSON.parse(fs.readFileSync(process.env.REVIEW_JSON, 'utf8'));

          const { partitionComments, filterToChangedFiles } = require(`${process.env.ACTION_PATH}/diff-lines.js`);
          const {
            toComments,
            formatCommentBody,
            formatFileLevelBody,
            severityCounts,
          } = require(`${process.env.ACTION_PATH}/../review-contract/render.js`);

          const comments = toComments(review);
          const questions = review.questions.map((q) =>
            q.source && q.source.length ? `${q.text} *(from: ${q.source.join(', ')})*` : q.text,
          );

          if (comments.length === 0 && questions.length === 0) {
            core.info('No inline comments or questions to post.');
            return;
          }

          // --- Clean up previous bot reviews ---

          const marker = '<!-- pi-judge -->';
          const { data: reviews } = await github.rest.pulls.listReviews({
            owner, repo, pull_number,
          });
          for (const review of reviews) {
            if (review.user?.type !== 'Bot' || !review.body?.includes(marker)) continue;
            try {
              // Delete inline comments from the old review
              const { data: reviewComments } = await github.rest.pulls.listCommentsForReview({
                owner, repo, pull_number, review_id: review.id, per_page: 100,
              });
              for (const rc of reviewComments) {
                await github.rest.pulls.deleteReviewComment({
                  owner, repo, comment_id: rc.id,
                });
              }
              // Replace the review body with a superseded notice
              await github.rest.pulls.updateReview({
                owner, repo, pull_number, review_id: review.id,
                body: `${marker}\n*Superseded by newer review.*`,
              });
            } catch (e) {
              core.warning(`Could not clean up review ${review.id}: ${e.message}`);
            }
          }

          // --- Partition comments into on-diff and off-diff ---

          const { data: files } = await github.rest.pulls.listFiles({
            owner, repo, pull_number, per_page: 300,
          });

          // Drop findings on files outside the net PR delta before anything is
          // posted or counted. The reviewer's full-history checkout lets it
          // report on stale/intermediate blobs. See PLT-1355.
          const { kept, dropped } = filterToChangedFiles(comments, files);
          for (const d of dropped) {
            core.warning(`Dropping finding outside PR delta: ${d.path}:${d.line} [${d.severity}]`);
          }
          if (kept.length === 0 && questions.length === 0) {
            core.info('No findings within the PR delta and no questions to post.');
            return;
          }

          // A whole-file finding (line: null) has no line to anchor to, so it goes
          // straight to a file-level comment. The rest are hunk-partitioned: a
          // comment is only "on-diff" if its whole [start_line, line] range sits
          // inside a single diff hunk, because GitHub's review API rejects ranges
          // that span two hunks. See diff-lines.js.
          const wholeFile = kept.filter((c) => c.line === null);
          const lineScoped = kept.filter((c) => c.line !== null);
          const { onDiff: onDiffComments, offDiff } = partitionComments(lineScoped, files);
          const fileLevel = [...wholeFile, ...offDiff];

          const onDiff = onDiffComments.map((c) => {
            const comment = { path: c.path, line: c.line, body: formatCommentBody(c) };
            if (c.start_line && c.start_line !== c.line) {
              comment.start_line = c.start_line;
            }
            return comment;
          });

          // --- Assemble review body ---

          let reviewBody = '<!-- pi-judge -->\n';
          if (kept.length > 0) {
            reviewBody += `${severityCounts(kept)}\n\n${kept.length} findings. See inline review comments for details.\n`;
          } else {
            reviewBody += 'No actionable findings.\n';
          }
          if (questions.length > 0) {
            reviewBody += '\n## Questions\n\n';
            for (const q of questions) {
              reviewBody += `- ${q}\n`;
            }
          }

          // --- Submit review ---

          // Belt-and-suspenders: the hunk-aware partitioning above should already
          // keep every onDiff comment resolvable, but don't let an unexpected
          // GitHub API error (rate limit, an edge case we didn't anticipate, etc.)
          // take down the whole job and lose the file-level comments below with it.
          try {
            await github.rest.pulls.createReview({
              owner, repo, pull_number,
              event: 'COMMENT',
              body: reviewBody,
              comments: onDiff,
            });
          } catch (e) {
            core.warning(`Could not create review with ${onDiff.length} inline comment(s): ${e.message}`);
          }

          // --- Post whole-file and off-diff findings as file-level comments ---

          const { data: pr } = await github.rest.pulls.get({
            owner, repo, pull_number,
          });
          for (const c of fileLevel) {
            try {
              await github.rest.pulls.createReviewComment({
                owner, repo, pull_number,
                commit_id: pr.head.sha,
                path: c.path,
                subject_type: 'file',
                body: formatFileLevelBody(c),
              });
            } catch (e) {
              core.warning(`Could not post file-level comment on ${c.path}: ${e.message}`);
            }
          }
