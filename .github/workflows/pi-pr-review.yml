name: Pi PR Review

on:
  workflow_call:
    inputs:
      pr-number:
        description: 'Pull request number to review'
        required: true
        type: number
      post-comment:
        description: 'Post or update PR comment with results'
        required: false
        default: true
        type: boolean
      runner-label:
        description: 'Runner label to use'
        required: false
        default: 'pi'
        type: string
      action-ref:
        description: 'Git ref of hivemq-pi-review-action to check out for prompts'
        required: false
        default: 'v1'
        type: string
    secrets:
      OPENAI_API_KEY:
        required: true
      OPENROUTER_API_KEY:
        required: true
      ANTHROPIC_API_KEY:
        required: true

concurrency:
  group: pi-review-${{ inputs.pr-number }}
  cancel-in-progress: true

jobs:
  setup:
    name: Setup
    runs-on: "${{ inputs.runner-label }}"
    outputs:
      review-matrix: ${{ steps.parse.outputs.review-matrix }}
      judge-model: ${{ steps.parse.outputs.judge-model }}
      judge-thinking: ${{ steps.parse.outputs.judge-thinking }}
    steps:
      - name: Parse model config
        id: parse
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          PI_REVIEW_MODELS: ${{ vars.PI_REVIEW_MODELS }}
        with:
          script: |
            const defaultConfig = {
              review: [
                { model: 'openai/gpt-5.4', thinking: 'medium', label: 'gpt-5.4' },
                { model: 'anthropic/claude-sonnet-4-6', thinking: 'medium', label: 'claude-sonnet-4.6' },
                { model: 'openrouter/google/gemini-3.1-pro-preview', label: 'gemini-3.1-pro' },
              ],
              judge: { model: 'openai/gpt-5.4', thinking: 'medium' },
            };

            const raw = process.env.PI_REVIEW_MODELS;
            if (!raw) {
              core.warning('PI_REVIEW_MODELS is not set — using defaults');
              core.setOutput('review-matrix', JSON.stringify(defaultConfig.review));
              core.setOutput('judge-model', defaultConfig.judge.model);
              core.setOutput('judge-thinking', defaultConfig.judge.thinking);
              return;
            }

            let config;
            try {
              config = JSON.parse(raw);
            } catch (e) {
              core.setFailed(`PI_REVIEW_MODELS is not valid JSON: ${e.message}`);
              return;
            }

            if (!Array.isArray(config.review) || config.review.length === 0) {
              core.setFailed('PI_REVIEW_MODELS.review must be a non-empty array');
              return;
            }
            for (const [i, entry] of config.review.entries()) {
              if (!entry.model) {
                core.setFailed(`PI_REVIEW_MODELS.review[${i}] is missing required field 'model'`);
                return;
              }
              if (!entry.label) {
                core.setFailed(`PI_REVIEW_MODELS.review[${i}] is missing required field 'label'`);
                return;
              }
            }

            if (!config.judge?.model) {
              core.setFailed('PI_REVIEW_MODELS.judge.model is required');
              return;
            }

            core.setOutput('review-matrix', JSON.stringify(config.review));
            core.setOutput('judge-model', config.judge.model);
            core.setOutput('judge-thinking', config.judge.thinking || '');

  pi_review:
    name: "Pi Review (${{ matrix.label }})"
    needs: [setup]
    runs-on: "${{ inputs.runner-label }}"
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.review-matrix) }}
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Resolve PR context
        id: pr_context
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ github.token }}
          script: |
            const number = ${{ inputs.pr-number }};

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: number,
            });

            core.setOutput('number', String(pr.number));
            core.setOutput('title', pr.title);
            core.setOutput('url', pr.html_url);
            core.setOutput('base_ref', pr.base.ref);
            core.setOutput('base_sha', pr.base.sha);
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('head_sha', pr.head.sha);

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: refs/pull/${{ steps.pr_context.outputs.number }}/merge
          fetch-depth: 0

      - name: Pre-fetch base and head refs
        run: |
          git fetch --no-tags origin \
            ${{ steps.pr_context.outputs.base_ref }} \
            +refs/pull/${{ steps.pr_context.outputs.number }}/head

      - name: Checkout action repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: hivemq/hivemq-pi-review-action
          ref: ${{ inputs.action-ref }}
          path: .pi-review-action

      - name: Ensure Node.js and Pi agent
        id: deps
        run: |
          if ! node --version 2>/dev/null | grep -q '^v24\.'; then
            echo "Node 24 not found, installing via setup-node..."
            echo "need_node=true" >> "$GITHUB_OUTPUT"
          fi
          command -v pi || echo "need_pi=true" >> "$GITHUB_OUTPUT"

      - name: Install Node.js
        if: steps.deps.outputs.need_node == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Install Pi coding agent
        if: steps.deps.outputs.need_pi == 'true'
        run: sudo npm install -g @mariozechner/pi-coding-agent

      - name: Ensure yq is installed (needed for .github/PI.yaml extraction)
        run: |
          if ! command -v yq >/dev/null 2>&1; then
            sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
            sudo chmod +x /usr/local/bin/yq
          fi
          yq --version

      - name: Print Pi version
        run: pi --version

      - name: Compute PR file list
        run: |
          git diff --name-status "$PR_BASE_SHA...$PR_HEAD_SHA" | tee pr-changed-files.txt
        env:
          PR_BASE_SHA: ${{ steps.pr_context.outputs.base_sha }}
          PR_HEAD_SHA: ${{ steps.pr_context.outputs.head_sha }}

      - name: Generate Pi review plan
        id: generate_plan
        run: |
          set -o pipefail
          {
            cat .pi-review-action/prompts/gen-review-plan.md
            printf '\n## Pre-computed PR delta\nUse this list as the PR delta:\n\n'
            cat pr-changed-files.txt
          } > pi-review-prompt.txt
          pi -p --model ${{ matrix.model }} ${{ matrix.thinking && format('--thinking {0}', matrix.thinking) || '' }} --no-session \
            "$(cat pi-review-prompt.txt)" \
            | tee pi-review-plan.txt
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_NUMBER: ${{ steps.pr_context.outputs.number }}
          PR_TITLE: ${{ steps.pr_context.outputs.title }}
          PR_URL: ${{ steps.pr_context.outputs.url }}
          PR_BASE_REF: ${{ steps.pr_context.outputs.base_ref }}
          PR_BASE_SHA: ${{ steps.pr_context.outputs.base_sha }}
          PR_HEAD_REF: ${{ steps.pr_context.outputs.head_ref }}
          PR_HEAD_SHA: ${{ steps.pr_context.outputs.head_sha }}
          REVIEW_PLAN_FILE: pi-review-plan.txt

      - name: Validate review plan output
        run: |
          if [ ! -s "pi-review-plan.txt" ] || ! grep -q '[^[:space:]]' pi-review-plan.txt; then
            echo "pi-review-plan.txt is missing or whitespace-only; failing fast."
            exit 1
          fi

      - name: Print review plan
        run: |
          echo "Full Pi review plan (${{ matrix.label }}):"
          cat pi-review-plan.txt

      - name: Assemble reviewer prompt (appends .github/PI.yaml sections)
        id: reviewer_prompt
        run: |
          # Base prompt is the checked-out action's review.md. If the target
          # repo publishes .github/PI.yaml, extract only the sections relevant
          # to the reviewer: `reviewer` (direct guidance) and `do_not_flag`
          # (patterns reviewers shouldn't raise). The `judge` section is
          # deliberately NOT appended here — that's filtering scope, not
          # reviewer scope. Missing file or empty sections → base prompt
          # unchanged, preserving pre-change behaviour.
          prompt_file="pi-review-prompt-assembled.txt"
          cp .pi-review-action/prompts/review.md "$prompt_file"

          appended_sections=""
          if [ -f ".github/PI.yaml" ]; then
            # yq prints `- <text>\n` per rule, or nothing when the section is
            # missing/empty. Both .reviewer and .do_not_flag are lists of
            # {id, text, added, evidence} maps.
            reviewer_bullets="$(yq -r '(.reviewer // []) | .[] | "- " + .text' .github/PI.yaml)"
            donotflag_bullets="$(yq -r '(.do_not_flag // []) | .[] | "- " + .text' .github/PI.yaml)"

            if [ -n "$reviewer_bullets" ] || [ -n "$donotflag_bullets" ]; then
              {
                printf '\n\n## Repo-specific guidance (.github/PI.yaml)\n\n'
                printf 'These rules are repository-specific guidance derived from recurring signals in historical Pi review outcomes on this repo. '
                printf 'They were accepted via maintainer review and reflect patterns this repo wants future reviews to respect. '
                printf '**Apply them alongside — not instead of — the instructions above. On conflict, the core instructions above win.**\n'
              } >> "$prompt_file"

              if [ -n "$reviewer_bullets" ]; then
                {
                  printf '\n### Reviewer rules\n'
                  printf 'When inspecting this PR, use these rules to guide what you flag and how you phrase it. '
                  printf 'Each was distilled from recurring feedback on prior merged PRs here.\n\n'
                  printf '%s\n' "$reviewer_bullets"
                } >> "$prompt_file"
                appended_sections="reviewer"
              fi

              if [ -n "$donotflag_bullets" ]; then
                {
                  printf '\n### Do not raise these patterns\n'
                  printf 'The repository has determined that flagging the patterns below wastes reviewer and author attention — prior authors consistently ignored or declined them. '
                  printf '**Do not raise issues matching these patterns.** If you see code that would otherwise trigger such a flag, omit it from your output.\n\n'
                  printf '%s\n' "$donotflag_bullets"
                } >> "$prompt_file"
                appended_sections="${appended_sections:+$appended_sections+}do_not_flag"
              fi
            fi
          fi

          if [ -n "$appended_sections" ]; then
            echo "Appended PI.yaml sections to reviewer prompt: $appended_sections."
          else
            echo "No applicable PI.yaml sections for reviewer; using base prompt unchanged."
          fi
          echo "path=$prompt_file" >> "$GITHUB_OUTPUT"

      - name: Run Pi review
        id: run_pi
        run: |
          set -o pipefail
          pi -p --model ${{ matrix.model }} ${{ matrix.thinking && format('--thinking {0}', matrix.thinking) || '' }} --no-session \
            "$(cat "${{ steps.reviewer_prompt.outputs.path }}")" \
            | tee pi-output.md

          sed -i 's|<h2>PR Review</h2>|<h2>PR Review (${{ matrix.label }})</h2>|' pi-output.md

          delim="PIEOF_$(dd if=/dev/urandom bs=15 count=1 status=none | base64)"
          {
            echo "final-message<<$delim"
            cat pi-output.md
            echo "$delim"
          } >> "$GITHUB_OUTPUT"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_NUMBER: ${{ steps.pr_context.outputs.number }}
          PR_TITLE: ${{ steps.pr_context.outputs.title }}
          PR_URL: ${{ steps.pr_context.outputs.url }}
          PR_BASE_REF: ${{ steps.pr_context.outputs.base_ref }}
          PR_BASE_SHA: ${{ steps.pr_context.outputs.base_sha }}
          PR_HEAD_REF: ${{ steps.pr_context.outputs.head_ref }}
          PR_HEAD_SHA: ${{ steps.pr_context.outputs.head_sha }}
          REVIEW_PLAN_FILE: pi-review-plan.txt

      - name: Publish Pi result to run summary
        if: ${{ steps.run_pi.outputs.final-message != '' }}
        env:
          PI_FINAL_MESSAGE: ${{ steps.run_pi.outputs.final-message }}
          PR_NUMBER: ${{ steps.pr_context.outputs.number }}
        run: |
          plan_section_file="$(mktemp)"
          final_with_plan_file="$(mktemp)"

          {
            echo "<details><summary>Full review plan</summary>"
            echo
            echo '```text'
            cat pi-review-plan.txt
            echo
            echo '```'
            echo
            echo "</details>"
            echo
          } > "$plan_section_file"

          if printf '%s\n' "$PI_FINAL_MESSAGE" | grep -q '<h2>PR Review'; then
            printf '%s\n' "$PI_FINAL_MESSAGE" | sed -e "0,/<h2>PR Review/{/<h2>PR Review/r $plan_section_file" -e "}" > "$final_with_plan_file"
          else
            {
              cat "$plan_section_file"
              printf '%s\n' "$PI_FINAL_MESSAGE"
            } > "$final_with_plan_file"
          fi

          {
            echo "## Pi PR review (${{ matrix.label }})"
            echo
            echo "PR #$PR_NUMBER"
            echo
            cat "$final_with_plan_file"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Pi output
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pi-pr-review-${{ matrix.label }}-${{ inputs.pr-number }}-${{ github.run_id }}
          path: |
            pi-output.md
            pi-review-plan.txt
          if-no-files-found: ignore

  pi_judge:
    name: Pi Judge
    needs: [setup, pi_review]
    if: ${{ !cancelled() && needs.pi_review.result != 'skipped' }}
    runs-on: "${{ inputs.runner-label }}"
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: refs/pull/${{ inputs.pr-number }}/merge
          fetch-depth: 1

      - name: Checkout action repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: hivemq/hivemq-pi-review-action
          ref: ${{ inputs.action-ref }}
          path: .pi-review-action

      - name: Ensure Node.js and Pi agent
        id: deps
        run: |
          if ! node --version 2>/dev/null | grep -q '^v24\.'; then
            echo "need_node=true" >> "$GITHUB_OUTPUT"
          fi
          command -v pi || echo "need_pi=true" >> "$GITHUB_OUTPUT"

      - name: Install Node.js
        if: steps.deps.outputs.need_node == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Install Pi coding agent
        if: steps.deps.outputs.need_pi == 'true'
        run: sudo npm install -g @mariozechner/pi-coding-agent

      - name: Ensure yq is installed (needed for .github/PI.yaml extraction)
        run: |
          if ! command -v yq >/dev/null 2>&1; then
            sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
            sudo chmod +x /usr/local/bin/yq
          fi
          yq --version

      - name: Print Pi version
        run: pi --version

      - name: Download all review artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: pi-pr-review-*-${{ inputs.pr-number }}-${{ github.run_id }}
          path: reviews

      - name: Assemble judge input
        run: |
          : > judge-input.md
          shopt -s nullglob
          for dir in reviews/pi-pr-review-*; do
            label="$(basename "$dir" | sed "s/^pi-pr-review-//; s/-${{ inputs.pr-number }}-${{ github.run_id }}$//")"
            if [ -f "$dir/pi-output.md" ]; then
              printf '\n---\n\n## Review: %s\n\n' "$label" >> judge-input.md
              cat "$dir/pi-output.md" >> judge-input.md
            fi
          done
          echo "=== Judge input: $(wc -c < judge-input.md) bytes ==="

      - name: Validate judge input
        id: validate_judge
        run: |
          if [ ! -s judge-input.md ] || ! grep -q '[^[:space:]]' judge-input.md; then
            echo "judge-input.md is missing or empty; skipping judge."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Assemble judge prompt (appends .github/PI.yaml sections)
        id: judge_prompt
        if: steps.validate_judge.outputs.skip != 'true'
        run: |
          # Judge gets only the sections relevant to filtering: `judge` (direct
          # judge guidance) and `do_not_flag` (patterns to drop if a reviewer
          # raised them anyway — defence in depth). The `reviewer` section is
          # NOT appended — that's reviewer scope, not judge scope. Missing file
          # or empty sections → base prompt unchanged.
          prompt_file="pi-judge-prompt-assembled.txt"
          cp .pi-review-action/prompts/judge.md "$prompt_file"

          appended_sections=""
          if [ -f ".github/PI.yaml" ]; then
            judge_bullets="$(yq -r '(.judge // []) | .[] | "- " + .text' .github/PI.yaml)"
            donotflag_bullets="$(yq -r '(.do_not_flag // []) | .[] | "- " + .text' .github/PI.yaml)"

            if [ -n "$judge_bullets" ] || [ -n "$donotflag_bullets" ]; then
              {
                printf '\n\n## Repo-specific guidance (.github/PI.yaml)\n\n'
                printf 'These rules are repository-specific guidance derived from recurring signals in historical Pi review outcomes on this repo. '
                printf 'They were accepted via maintainer review and reflect patterns this repo wants future reviews to respect. '
                printf '**Apply them alongside — not instead of — the instructions above. On conflict, the core instructions above win.**\n'
              } >> "$prompt_file"

              if [ -n "$judge_bullets" ]; then
                {
                  printf '\n### Judge rules\n'
                  printf 'When filtering the reviewers'\'' issue lists, apply these rules in addition to your existing filtering logic. '
                  printf 'Each was distilled from recurring signal in past Pi judge outcomes on this repo.\n\n'
                  printf '%s\n' "$judge_bullets"
                } >> "$prompt_file"
                appended_sections="judge"
              fi

              if [ -n "$donotflag_bullets" ]; then
                {
                  printf '\n### Drop these patterns if a reviewer raised them\n'
                  printf 'This is a backstop. Reviewers have been told not to raise these patterns, but if one slipped through, drop it from the final output. '
                  printf 'The repository has determined these are unproductive to flag.\n\n'
                  printf '%s\n' "$donotflag_bullets"
                } >> "$prompt_file"
                appended_sections="${appended_sections:+$appended_sections+}do_not_flag"
              fi
            fi
          fi

          if [ -n "$appended_sections" ]; then
            echo "Appended PI.yaml sections to judge prompt: $appended_sections."
          else
            echo "No applicable PI.yaml sections for judge; using base prompt unchanged."
          fi
          echo "path=$prompt_file" >> "$GITHUB_OUTPUT"

      - name: Run Pi Judge
        id: run_judge
        if: steps.validate_judge.outputs.skip != 'true'
        run: |
          set -o pipefail
          pi -p --model ${{ needs.setup.outputs.judge-model }} ${{ needs.setup.outputs.judge-thinking && format('--thinking {0}', needs.setup.outputs.judge-thinking) || '' }} --no-session \
            "$(cat "${{ steps.judge_prompt.outputs.path }}")" \
            | tee pi-judge-output.md

          delim="PIEOF_$(dd if=/dev/urandom bs=15 count=1 status=none | base64)"
          {
            echo "final-message<<$delim"
            cat pi-judge-output.md
            echo "$delim"
          } >> "$GITHUB_OUTPUT"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          JUDGE_INPUT_FILE: judge-input.md

      - name: Publish judge result to run summary
        if: ${{ steps.run_judge.outputs.final-message != '' }}
        env:
          PI_FINAL_MESSAGE: ${{ steps.run_judge.outputs.final-message }}
          PR_NUMBER: ${{ inputs.pr-number }}
        run: |
          {
            echo "## Pi Judge"
            echo
            echo "PR #$PR_NUMBER"
            echo
            printf '%s\n' "$PI_FINAL_MESSAGE"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upsert judge comment
        if: ${{ steps.run_judge.outputs.final-message != '' && inputs.post-comment }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          PI_FINAL_MESSAGE: ${{ steps.run_judge.outputs.final-message }}
          PR_NUMBER: ${{ inputs.pr-number }}
        with:
          github-token: ${{ github.token }}
          script: |
            const marker = '<!-- pi-judge -->';
            const body = `${marker}\n${process.env.PI_FINAL_MESSAGE}`;
            const issue_number = Number(process.env.PR_NUMBER);

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (c) => c.user?.type === 'Bot' && c.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });

              // Un-minimize the comment in case it was marked as outdated
              try {
                await github.graphql(`
                  mutation($id: ID!) {
                    unminimizeComment(input: { subjectId: $id }) {
                      unminimizedComment { isMinimized }
                    }
                  }
                `, { id: existing.node_id });
              } catch (_) { /* comment may not be minimized */ }
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }

      - name: Upload judge output
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pi-judge-${{ inputs.pr-number }}-${{ github.run_id }}
          path: |
            pi-judge-output.md
            judge-input.md
          if-no-files-found: ignore
