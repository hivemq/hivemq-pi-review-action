name: 'Pi PR Review - Resolve Event'
description: 'Determines if the current GitHub event should trigger a Pi PR review'
inputs:
  allowed-comment-associations:
    description: >-
      Comma-separated list of GitHub author associations allowed to trigger a review
      via /review comment (e.g. OWNER,MEMBER,COLLABORATOR). Leave empty to allow anyone.
    required: false
    default: 'OWNER,MEMBER,COLLABORATOR'
outputs:
  should-run:
    description: 'Whether the review should run (true/false)'
    value: ${{ steps.resolve.outputs.should-run }}
  pr-number:
    description: 'The PR number to review'
    value: ${{ steps.resolve.outputs.pr-number }}
  post-comment:
    description: 'Whether to post/update a PR comment (true/false)'
    value: ${{ steps.resolve.outputs.post-comment }}
runs:
  using: composite
  steps:
    - id: resolve
      shell: bash
      env:
        COMMENT_BODY: ${{ github.event.comment.body }}
      run: |
        should_run=false
        pr_number=""
        post_comment=false

        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          should_run=true
          pr_number="${{ github.event.inputs.pr_number }}"
          post_comment="${{ github.event.inputs.post_comment }}"
          if [ -z "$post_comment" ]; then
            post_comment=false
          fi

        elif [ "${{ github.event_name }}" = "issue_comment" ]; then
          # Only trigger on PR comments that start with /review
          is_pr="${{ github.event.issue.pull_request && 'true' || 'false' }}"
          comment_body="$COMMENT_BODY"
          allowed_associations="${{ inputs.allowed-comment-associations }}"
          author_association="${{ github.event.comment.author_association }}"

          if [ "$is_pr" = "true" ] && [[ "$comment_body" == /review* ]]; then
            if [ -z "$allowed_associations" ] || echo ",$allowed_associations," | grep -qi ",$author_association,"; then
              should_run=true
              pr_number="${{ github.event.issue.number }}"
              post_comment=true
            else
              echo "Ignoring /review from author_association=$author_association (allowed: $allowed_associations)"
            fi
          fi

        elif [ "${{ github.event_name }}" = "pull_request" ]; then
          is_draft="${{ github.event.pull_request.draft }}"
          label_name="${{ github.event.label.name }}"
          # Two label triggers:
          #   'review'        — the standard trigger; gated to non-draft PRs so
          #                     that an auto-applied 'review' label never starts
          #                     a review on a draft.
          #   'manual-review' — an explicit, manually-added label that triggers
          #                     regardless of draft state, letting authors get a
          #                     Pi review before marking the PR ready for review.
          if { [ "$label_name" = "review" ] && [ "$is_draft" != "true" ]; } || [ "$label_name" = "manual-review" ]; then
            should_run=true
            pr_number="${{ github.event.pull_request.number }}"
            post_comment=true
          fi
        fi

        echo "should-run=$should_run" >> "$GITHUB_OUTPUT"
        echo "pr-number=$pr_number" >> "$GITHUB_OUTPUT"
        echo "post-comment=$post_comment" >> "$GITHUB_OUTPUT"

        echo "Event: ${{ github.event_name }}"
        echo "should-run=$should_run"
        echo "pr-number=$pr_number"
        echo "post-comment=$post_comment"
