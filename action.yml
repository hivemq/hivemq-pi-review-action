name: 'Pi PR Review - Resolve Event'
description: 'Determines if the current GitHub event should trigger a Pi PR review'
outputs:
  should-run:
    description: 'Whether the review should run (true/false)'
    value: ${{ steps.resolve.outputs.should-run }}
  pr-number:
    description: 'The PR number to review'
    value: ${{ steps.resolve.outputs.pr-number }}
  post-comment:
    description: 'Whether to post/update a PR comment (true/false)'
    value: ${{ steps.resolve.outputs.post-comment }}
runs:
  using: composite
  steps:
    - id: resolve
      shell: bash
      run: |
        should_run=false
        pr_number=""
        post_comment=false

        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          should_run=true
          pr_number="${{ github.event.inputs.pr_number }}"
          post_comment="${{ github.event.inputs.post_comment }}"
          if [ -z "$post_comment" ]; then
            post_comment=false
          fi

        elif [ "${{ github.event_name }}" = "issue_comment" ]; then
          # Only trigger on PR comments that start with /review
          is_pr="${{ github.event.issue.pull_request && 'true' || 'false' }}"
          comment_body="${{ github.event.comment.body }}"
          if [ "$is_pr" = "true" ] && [[ "$comment_body" == /review* ]]; then
            should_run=true
            pr_number="${{ github.event.issue.number }}"
            post_comment=true
          fi

        elif [ "${{ github.event_name }}" = "pull_request" ]; then
          # Only trigger on non-draft PRs with the 'review' label
          is_draft="${{ github.event.pull_request.draft }}"
          label_name="${{ github.event.label.name }}"
          if [ "$is_draft" != "true" ] && [ "$label_name" = "review" ]; then
            should_run=true
            pr_number="${{ github.event.pull_request.number }}"
            post_comment=true
          fi
        fi

        echo "should-run=$should_run" >> "$GITHUB_OUTPUT"
        echo "pr-number=$pr_number" >> "$GITHUB_OUTPUT"
        echo "post-comment=$post_comment" >> "$GITHUB_OUTPUT"

        echo "Event: ${{ github.event_name }}"
        echo "should-run=$should_run"
        echo "pr-number=$pr_number"
        echo "post-comment=$post_comment"
